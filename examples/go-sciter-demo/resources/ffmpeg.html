<!DOCTYPE html>
<html lang="en" window-resizable="true" window-frame="standard">

<head>
    <meta charset="UTF-8" />
    <style src="css/common.css"></style>
    <style src="css/modtemplate.css"></style>
    <script src="js/common.js"></script>
    <script src="js/modtemplate.js"></script>
    <style>
        select > caption {
            background-color: #f5f5f5;
        }
    </style>
    <script>
        setModName("ffmpeg");
    </script>
</head>

<body>
    <frameset cols="200px,*">
        <div style="background: white;margin: 0;">
            <select|list #demolist>
                <option selected value="index">介绍</option>
                <caption><icon|image />图片</caption>
                <option value="image-edgedetect">图片描边</option>
                <option value="image-conver">图片格式转换</option>
                <option value="image-reverse">图片颜色反转</option>
                <option value="image-bw">图片黑白照片</option>
                <caption><icon|video style="color: #69c0ff;"/>视频</caption>
                <option value="video-cover">添加视频封面</option>
                <option value="video-conver">视频格式转换</option>
            </select>
        </div>
        <splitter />
        <frame #sampleFrame src="ffmpeg/index.html"></frame>
    </frameset>
</body>

</html>
