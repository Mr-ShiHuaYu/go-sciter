<style src="../css/common.css"></style>
<script src="../js/common.js"></script>
<script>
    function loadFile(url) {
        Window.this.xcall("loadFile", url);
    }

    // 统一处理按钮事件,注意选择器必须逐级向下，不能跳级
    document.on("click", "ul#navMenu > li > menu > li", function (evt, li) {
        let src = li.attributes["src"];
        let id = li.attributes["id"];
        let url = src;
        if (url == "" || url == undefined) {
            url = id;
        }
        if(!isStrEmpty(url)){
            url ="sample/"+url+".html"
            loadFile(url);
        }
    });

</script>
