<!DOCTYPE html>
<html lang="en" window-resizable="true" window-frame="standard">

<head>
    <meta charset="UTF-8" />
    <title>Menu菜单示例</title>
    <style src="../css/common.css"></style>
    <script src="../js/fileDropZone.js"></script>
    <script src="../js/common.js"></script>
    <script>
        document.on("change", "#menuTree", (evt, element) => {
            tryCatch(()=>{
                let subElement = document.$("option[value="+element.value+"]");
                if(subElement!=null){
                    let id = subElement.value;// sub.
                    let src = subElement.attributes["src"];
                    if(!isStrEmpty(src)){
                        id = src;
                    }
                    showInfo("select item click="+id);
                }
            });
        });

        // document.on("click", "li#exit", (evt,li) => {
        //     showInfo("menu item click on exit ");
        // });
    </script>
    <style>
        select {
            display:block;
            height: '*';
        }
        select > option{
            min-width: 100%;
            /* height: 30px; */
            margin:2px;
            /* margin-left: -12px; */
            vertical-align: middle;
            text-align:left;
        }
        /* 没有子元素设置高度 */
        select > option:empty{ 
            height: 30px;
        }
        select > option > option {
            min-width: 100%;
            height: 30px;
            vertical-align: middle;
        }
        option > caption {
            width: 100%;
            height: 30px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <include src="nav-menu.html" />

    <select|tree #menuTree>
        <option expanded>
            <caption>文件</caption>
            <option>打开文件</option>
            <option>退出</option>
        </option>
        <option>
            <caption>示例</caption>
            <option value="helloworld" src="index">HelloWorld</option>
            <option value="custom-header">查看自定义标题</option>
            <option value="button">按钮与弹窗</option>
            <option value="constant">常量</option>
            <option value="clipboard">剪切板示例</option>
            <option value="file">选择文件/目录</option>
            <option value="callback">Go与JS互相调用</option>
            <option value="trayIcon">托盘图标</option>
            <option value="icons">icon示例</option>
            <option value="layout">Layout布局示例</option>
            <option value="grid">Grid布局示例</option>
            <option value="collapse">折叠面板collapse示例</option>
            <option value="form">form示例</option>
            <option value="zip">Zip示例</option>
            <option value="folder">Folder示例</option>
            <option value="menu">Menu菜单示例</option>
            <option value="select-tree">Tree示例</option>
        </option>
        <option>关于</option>
        </select>

</body>

</html>
