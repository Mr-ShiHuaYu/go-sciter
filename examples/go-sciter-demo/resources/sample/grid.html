<!DOCTYPE html>
<html lang="en" window-resizable="true" window-frame="standard">

<head>
    <meta charset="UTF-8" />
    <title>Grid布局示例</title>
    <style src="../css/common.css"></style>
    <style>
        body{height: 100%;width: 100%;margin: 0;}
        .layout {
            flow: grid( 1 1 1,
                        2 5 3,
                        4 4 4) !important;
            border-spacing: 3px;
            padding: 3px;
            margin:0;
            height: "*";
        }

        .layout > * {
                border:1px solid;
                background:gold;
                text-align:center;
                vertical-align:middle;
        }

        .layout > main {
              size:"*"; /* spans all available space,
             shifting other elements to borders */
        }
    </style>
</head>

<body>
    <div class="layout">
        <header>header,1</header>
        <nav>nav,2</nav>
        <aside>aside,3</aside>
        <footer>footer,4</footer>
        <main>main,5</main>  
    </div>
</body>

</html>
